<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description | strip_html | strip_newlines | truncate: 160 }}">
    <title>{{ site.title }}</title>

    <!-- Open Graph -->
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description | strip_html | strip_newlines | truncate: 200 }}">
    <meta property="og:type" content="website">
    <meta property="og:url" content="{{ site.url }}">

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>T</text></svg>">

    <link rel="stylesheet" href="{{ "/css/landing.css" | prepend: site.baseurl }}?v=3">
    {% if site.google_analytics %}
      {% include google-analytics.html %}
    {% endif %}
  </head>
  <body>
    <nav class="site-nav" id="site-nav">
      <div class="nav-inner">
        <a href="#top" class="nav-brand">TS</a>
        <div class="nav-links">
          <a href="#focus">Focus</a>
          <a href="#services">Services</a>
          <a href="#writing">Writing</a>
          <a href="#experience">Experience</a>
          <a href="#lab">Lab</a>
          <a href="mailto:consulting@taylorsando.com" class="nav-cta">Contact</a>
        </div>
      </div>
    </nav>
    <div class="landing-container" id="top">
      <main class="content-wrapper">
        {{ content }}
      </main>
    </div>
    <script>
      // Sticky nav: add scrolled class after 80px
      const nav = document.getElementById('site-nav');
      let ticking = false;
      window.addEventListener('scroll', function() {
        if (!ticking) {
          requestAnimationFrame(function() {
            nav.classList.toggle('scrolled', window.scrollY > 80);
            ticking = false;
          });
          ticking = true;
        }
      });

      // Scroll reveal: observe all .reveal elements
      if ('IntersectionObserver' in window) {
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add('visible');
              observer.unobserve(entry.target);
            }
          });
        }, { threshold: 0.08 });
        document.querySelectorAll('.reveal').forEach(function(el) {
          observer.observe(el);
        });
      } else {
        // Fallback: just show everything
        document.querySelectorAll('.reveal').forEach(function(el) {
          el.classList.add('visible');
        });
      }
    </script>
  </body>
</html>
